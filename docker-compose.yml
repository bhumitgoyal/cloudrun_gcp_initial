# docker-compose.yml
# LOCAL DEVELOPMENT ONLY — not used in App Engine production deployment.
# Local Redis Stack with RediSearch module for semantic cache development.
#
# Usage:
#   docker compose up -d
#   docker compose down -v   # tear down with data cleanup
#
# Redis Stack includes: RediSearch, RedisJSON, RedisTimeSeries, RedisBloom.
# RediSearch provides the HNSW vector index used by bot/rag_cache.py.

version: "3.8"

services:
  redis:
    image: redis/redis-stack:latest
    container_name: gohappy-redis
    ports:
      - "6379:6379"    # Redis protocol
      - "8001:8001"    # RedisInsight web UI
    environment:
      - REDIS_ARGS=--maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
